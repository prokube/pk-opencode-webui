# Docker Compose example with nginx reverse proxy
# 
# This serves opencode-web at http://localhost/apps/opencode/
#
# Usage:
#   1. Start the OpenCode API server in your project directory:
#      cd /your/project && opencode serve
#   2. Run this compose file:
#      docker compose up

services:
  opencode-ui:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    environment:
      - BASE_PATH=/apps/opencode/
      - API_URL=http://host.docker.internal:4096
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8080"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - opencode-ui
