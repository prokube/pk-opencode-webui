# Example nginx configuration for opencode-web
# Serves the UI at /apps/opencode/ prefix

upstream opencode-ui {
    server opencode-ui:8080;
}

server {
    listen 80;
    server_name localhost;

    # OpenCode Web UI at /apps/opencode/
    location /apps/opencode/ {
        proxy_pass http://opencode-ui/;
        proxy_http_version 1.1;
        
        # WebSocket support (for terminal)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE support (for message streaming)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }
}
